model:
  vocab_size: 50257
  max_seq_len: 1024
  embed_dim: 768
  num_layers: 12
  num_heads: 12
  head_dim: 64
  mlp_ratio: 4.0
  use_rope: true
  use_mla: true
  mla_rank: 32
  dropout: 0.1

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  lr: 3e-4
  weight_decay: 0.1
  max_epochs: 3
  precision: "bf16"
  checkpoint_dir: "checkpoints/"
  seed: 42
  dataset_name: "roneneldan/TinyStories"
  dataset_split: "train"